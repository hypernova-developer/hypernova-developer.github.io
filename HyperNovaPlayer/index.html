<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperNova Player</title>
    <link rel="icon" type="image/png" href="hypernova_logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(125, 95, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(125, 95, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background-color: rgba(125, 95, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(125, 95, 255, 0.8);
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(20, 20, 20, 0.95);
            border: 1px solid #7d5fff;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(125, 95, 255, 0.2);
            padding: 30px;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            display: flex;
            gap: 30px;
        }

        .main-player {
            flex: 1;
        }

        .volume-aside {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-left: 1px solid rgba(125, 95, 255, 0.3);
            padding-left: 20px;
        }

        .volume-label {
            color: #7d5fff;
            font-weight: bold;
            font-size: 12px;
        }

        .volume-display {
            color: #7d5fff;
            font-weight: bold;
        }

        .volume-slider-container {
            height: 200px;
            width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="range"].vertical {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 8px;
            height: 100%;
            background: #1a1a1a;
            outline: none;
            border-radius: 5px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #7d5fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(125, 95, 255, 0.5);
        }

        .file-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border: 1px dashed #7d5fff;
            border-radius: 8px;
            margin-bottom: 30px;
            background-color: rgba(125, 95, 255, 0.03);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid #7d5fff;
            background-color: transparent;
            color: #7d5fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover:not(:disabled) {
            background-color: #7d5fff;
            color: white;
            box-shadow: 0 0 15px rgba(125, 95, 255, 0.6);
        }

        .control-btn:disabled {
            border-color: #444;
            color: #444;
            opacity: 0.5;
        }

        .track-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 10px;
            background-color: #1a1a1a;
            border-radius: 5px;
            margin-bottom: 10px;
            position: relative;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            background-color: #1a1a1a;
            border: 1px solid #333;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #7d5fff, #ae9eff);
            width: 0%;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #7d5fff;
            font-weight: bold;
        }

        .playlist {
            border-top: 1px solid #333;
            padding-top: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .playlist-item {
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            background-color: rgba(125, 95, 255, 0.05);
            border: 1px solid transparent;
            transition: 0.2s;
            font-size: 14px;
        }

        .playlist-item.active {
            border-color: #7d5fff;
            background-color: rgba(125, 95, 255, 0.15);
            color: #fff;
        }

        #no-tracks-message {
            text-align: center;
            opacity: 0.5;
        }

        .loop-btn.active {
            background-color: #7d5fff;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #7d5fff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursor"></div>

    <div class="container">
        <div class="main-player">
            <h1>HyperNova Player</h1>
            
            <div class="file-input-container">
                <input type="file" id="music-files" accept="audio/*" multiple title="Select music files" aria-label="Music file selector">
            </div>
            
            <div class="track-info">
                <h3 id="current-track-title">System Idle</h3>
                <p id="current-track-artist">Waiting for input...</p>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress" id="progress-bar"></div>
                    </div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="control-btn" id="rewind-btn" disabled title="Rewind 10s">⏪</button>
                <button class="control-btn" id="play-btn" disabled title="Play">▶</button>
                <button class="control-btn" id="pause-btn" disabled title="Pause">⏸</button>
                <button class="control-btn" id="stop-btn" disabled title="Stop">⏹</button>
                <button class="control-btn" id="forward-btn" disabled title="Forward 10s">⏩</button>
                <button class="control-btn loop-btn" id="loop-btn" title="Toggle Loop">🔁</button>
            </div>
            
            <div class="playlist">
                <div id="playlist-container">
                    <p id="no-tracks-message">Library empty.</p>
                </div>
            </div>
        </div>

        <aside class="volume-aside">
            <span class="volume-label">VOL</span>
            <div class="volume-slider-container">
                <input type="range" id="volume-control" class="vertical" min="0" max="5" step="1" value="2" title="Volume Control" aria-label="Volume">
            </div>
            <span id="volume-level" class="volume-display">2</span>
        </aside>
    </div>

    <script>
        const musicFilesInput = document.getElementById('music-files');
        const playlistContainer = document.getElementById('playlist-container');
        const noTracksMessage = document.getElementById('no-tracks-message');
        const currentTrackTitle = document.getElementById('current-track-title');
        const currentTrackArtist = document.getElementById('current-track-artist');
        const progressBar = document.getElementById('progress-bar');
        const progressWrapper = document.getElementById('progress-wrapper');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');
        const volumeControl = document.getElementById('volume-control');
        const volumeLevel = document.getElementById('volume-level');
        const cursor = document.getElementById('cursor');
        
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const rewindBtn = document.getElementById('rewind-btn');
        const loopBtn = document.getElementById('loop-btn');
        
        let audioContext;
        let audioElement;
        let currentTrackIndex = 0;
        let tracks = [];
        let isPlaying = false;
        let isLooping = false;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        musicFilesInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            tracks = [];
            playlistContainer.innerHTML = '';
            files.forEach((file, index) => {
                const filePath = URL.createObjectURL(file);
                const fileName = file.name.replace(/\.[^/.]+$/, "");
                tracks.push({ path: filePath, name: fileName });
                const playlistItem = document.createElement('div');
                playlistItem.className = 'playlist-item';
                playlistItem.textContent = fileName;
                playlistItem.dataset.index = index;
                if (index === currentTrackIndex) playlistItem.classList.add('active');
                playlistItem.addEventListener('click', function() {
                    currentTrackIndex = parseInt(this.dataset.index);
                    loadTrack(currentTrackIndex);
                    playTrack();
                    updateActivePlaylistItem();
                });
                playlistContainer.appendChild(playlistItem);
            });
            if (tracks.length > 0) {
                loadTrack(0);
                enableControls(true);
            }
        });
        
        function loadTrack(index) {
            if (!tracks[index]) return;
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            audioElement = new Audio(tracks[index].path);
            audioElement.volume = volumeControl.value / 5;
            currentTrackTitle.textContent = tracks[index].name;
            currentTrackArtist.textContent = "HyperNova Engine Active";
            audioElement.addEventListener('timeupdate', updateProgress);
            audioElement.addEventListener('loadedmetadata', () => {
                durationDisplay.textContent = formatTime(audioElement.duration);
            });
            audioElement.addEventListener('ended', trackEnded);
            initAudioContext();
        }

        volumeControl.addEventListener('input', function() {
            const val = parseInt(this.value);
            volumeLevel.textContent = val;
            if (audioElement) {
                audioElement.volume = val / 5;
            }
        });

        progressWrapper.addEventListener('click', (e) => {
            if (!audioElement) return;
            const rect = progressWrapper.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = pos * audioElement.duration;
        });
        
        function playTrack() {
            if (!audioElement) return;
            if (audioContext.state === 'suspended') audioContext.resume();
            audioElement.play();
            isPlaying = true;
            playBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            forwardBtn.disabled = false;
            rewindBtn.disabled = false;
        }
        
        function pauseTrack() {
            if (!audioElement || !isPlaying) return;
            audioElement.pause();
            isPlaying = false;
            playBtn.disabled = false;
            pauseBtn.disabled = true;
        }
        
        function stopTrack() {
            if (!audioElement) return;
            audioElement.pause();
            audioElement.currentTime = 0;
            isPlaying = false;
            updateProgress();
            playBtn.disabled = false;
            pauseBtn.disabled = true;
            stopBtn.disabled = true;
        }
        
        function forwardTrack() {
            if (audioElement) audioElement.currentTime = Math.min(audioElement.currentTime + 10, audioElement.duration);
        }
        
        function rewindTrack() {
            if (audioElement) audioElement.currentTime = Math.max(audioElement.currentTime - 10, 0);
        }
        
        function trackEnded() {
            if (isLooping) {
                audioElement.currentTime = 0;
                playTrack();
            } else if (currentTrackIndex < tracks.length - 1) {
                currentTrackIndex++;
                loadTrack(currentTrackIndex);
                playTrack();
                updateActivePlaylistItem();
            } else {
                stopTrack();
            }
        }
        
        function updateProgress() {
            if (!audioElement) return;
            const progress = (audioElement.currentTime / audioElement.duration) * 100;
            progressBar.style.width = progress + '%';
            currentTimeDisplay.textContent = formatTime(audioElement.currentTime);
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
        
        function updateActivePlaylistItem() {
            const items = playlistContainer.querySelectorAll('.playlist-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === currentTrackIndex);
            });
        }
        
        function enableControls(enabled) {
            playBtn.disabled = !enabled;
            forwardBtn.disabled = !enabled;
            rewindBtn.disabled = !enabled;
        }
        
        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            loopBtn.classList.toggle('active', isLooping);
        });
        
        playBtn.addEventListener('click', playTrack);
        pauseBtn.addEventListener('click', pauseTrack);
        stopBtn.addEventListener('click', stopTrack);
        forwardBtn.addEventListener('click', forwardTrack);
        rewindBtn.addEventListener('click', rewindTrack);
    </script>
</body>
</html>
